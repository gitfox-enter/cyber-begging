<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ 请作者喝杯咖啡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .qr-grid {
            display: grid;
            gap: 20px;
        }
        .qr-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
        }
        .qr-item img {
            width: 100%;
            max-width: 250px;
            border-radius: 8px;
        }
        .qr-label {
            margin-top: 12px;
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }
        .qr-hint {
            margin-top: 6px;
            color: #888;
            font-size: 12px;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ 请作者喝杯咖啡</h1>
        <p class="subtitle">如果我的内容对你有帮助，欢迎打赏支持</p>
        
        <div class="qr-grid">
            <div class="qr-item">
                <img src="wechat.jpg" alt="微信赞赏">
                <div class="qr-label">微信赞赏</div>
                <div class="qr-hint">长按识别二维码</div>
            </div>
            
            <div class="qr-item">
                <img src="alipay-gift.jpg" alt="支付宝红包">
                <div class="qr-label">支付宝红包</div>
                <div class="qr-hint">扫码领红包，天天有优惠</div>
            </div>
        </div>
        
        <div class="footer">
            感谢您的支持与信任 ❤️
        </div>
    </div>
</body>
</html>
