<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博乞讨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
            background: #f0e8d5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: #faf5e6;
            border-radius: 4px;
            padding: 30px 20px 24px;
            max-width: 640px;
            width: 100%;
            text-align: center;
            border: 1px solid #d4c9a5;
            box-shadow: 0 0 30px rgba(130,100,60,0.15);
        }
        .header {
            margin-bottom: 20px;
            position: relative;
        }
        .header h1 {
            color: #5a4030;
            font-size: 28px;
            letter-spacing: 6px;
            font-weight: 400;
        }
        .header .sub {
            color: #9a8a70;
            font-size: 12px;
            margin-top: 6px;
            letter-spacing: 2px;
        }
        .begging-gif {
            margin: 16px 0;
            text-align: center;
        }
        .begging-gif img {
            max-width: 200px;
            width: 100%;
            border-radius: 4px;
        }
        .tagline {
            color: #6a5a48;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.8;
            border-top: 1px dashed #d4c9a5;
            border-bottom: 1px dashed #d4c9a5;
            padding: 12px 0;
        }
        .tagline span {
            display: block;
        }
        .tagline .em {
            color: #c0392b;
            font-style: normal;
        }
        .qr-grid {
            display: grid;
            gap: 16px;
        }
        .qr-item {
            background: #f5edd8;
            border-radius: 4px;
            padding: 16px;
            border: 1px solid #ddd0ad;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative;
        }
        .qr-item:hover,
        .qr-item:active {
            border-color: #c0b08a;
            box-shadow: 0 0 12px rgba(130,100,60,0.12);
        }
        .qr-item img {
            width: 100%;
            max-width: 220px;
            border-radius: 2px;
            display: block;
            margin: 0 auto;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        .qr-label {
            margin-top: 10px;
            color: #7a6a58;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .qr-hint {
            margin-top: 4px;
            color: #9a8a75;
            font-size: 11px;
        }
        .qr-hint .highlight {
            color: #b0a080;
            font-style: normal;
        }
        /* 桌面端 — 二维码并排 + 下载提示 */
        @media (min-width: 560px) {
            .qr-grid {
                grid-template-columns: 1fr 1fr;
            }
            .qr-item img {
                max-width: 200px;
            }
            .qr-hint .mobile-only {
                display: none;
            }
            .qr-hint .desktop-only {
                display: inline;
            }
        }
        /* 移动端 — 竖排 + 扫码提示 */
        @media (max-width: 559px) {
            .qr-grid {
                grid-template-columns: 1fr;
            }
            .container {
                max-width: 420px;
            }
            .qr-item img {
                max-width: 220px;
            }
            .qr-hint .mobile-only {
                display: inline;
            }
            .qr-hint .desktop-only {
                display: none;
            }
        }
        /* 下载按钮（桌面 hover 显示） */
        .qr-item .download-overlay {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(60,45,30,0.75);
            color: #e8dcc5;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            letter-spacing: 1px;
        }
        @media (hover: hover) {
            .qr-item:hover .download-overlay {
                opacity: 1;
            }
        }
        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(60,45,30,0.9);
            color: #e8dcc5;
            font-size: 13px;
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid #b0a080;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
        .footer {
            margin-top: 24px;
            color: #8a7a65;
            font-size: 11px;
            line-height: 1.8;
        }
        .footer .bow {
            color: #7a6a58;
            font-size: 13px;
        }
        .counter {
            margin-top: 16px;
            padding: 8px 0;
            border-top: 1px solid #d4c9a5;
            color: #9a8a75;
            font-size: 10px;
        }
        .blink {
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 赛博乞讨</h1>
            <div class="sub">CYBER BEGGING v1.0</div>
        </div>

        <div class="begging-gif">
            <img src="begging.gif" alt="好心人给点钱吧~">
        </div>

        <div class="tagline">
            <span>行行好 🥺 赏口饭吃</span>
            <span style="margin-top:6px;">您的每一分<span class="em">施舍</span></span>
            <span>都是我继续<em style="color:#6a5a48;font-style:normal;">积极生活</em>的动力</span>
        </div>

        <div class="qr-grid">
            <div class="qr-item" onclick="downloadQR('wechat.jpg')">
                <img src="wechat.jpg" alt="微信赞赏" loading="lazy">
                <div class="qr-label">💳 微信施舍入口</div>
                <div class="qr-hint">
                    <span class="mobile-only">长按识别·扫码打钱</span>
                    <span class="desktop-only">点击下载二维码 · <i class="highlight">扫码打钱</i></span>
                </div>
                <div class="download-overlay">⬇ 下载二维码</div>
            </div>
            <div class="qr-item" onclick="downloadQR('alipay-gift.jpg')">
                <img src="alipay-gift.jpg" alt="支付宝红包" loading="lazy">
                <div class="qr-label">🧧 支付宝红包</div>
                <div class="qr-hint">
                    <span class="mobile-only">长按识别·扫码打钱</span>
                    <span class="desktop-only">点击下载二维码 · <i class="highlight">扫码打钱</i></span>
                </div>
                <div class="download-overlay">⬇ 下载二维码</div>
            </div>
        </div>

        <div class="footer">
            <div class="bow">🙏 好人一生平安</div>
            <div style="margin-top:4px;">本页没有任何商业模式</div>
            <div>纯粹是作者 <span style="color:#8a7a65;">穷</span> 了</div>
        </div>

        <div class="counter">
            <span class="blink">●</span> 在线乞讨中 · 感谢每一位金主爸爸
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function downloadQR(src) {
            var link = document.createElement('a');
            link.href = src;
            link.download = src;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            var toast = document.getElementById('toast');
            var filename = src === 'wechat.jpg' ? '微信收款码' : '支付宝红包码';
            toast.textContent = '📥 ' + filename + ' 已开始下载';
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(function () {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
